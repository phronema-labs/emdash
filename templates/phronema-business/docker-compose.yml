services:
  emdash:
    build:
      context: ../..
      dockerfile: templates/phronema-business/Dockerfile
    ports:
      - "4321:4321"
    volumes:
      - emdash-data:/app/data
      - emdash-uploads:/app/uploads
    environment:
      - HOST=0.0.0.0
      - PORT=4321
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - emdash
    restart: unless-stopped

volumes:
  emdash-data:
  emdash-uploads:
  caddy-data:
  caddy-config:
